version: "3.8"
services:
  neo4j:
    image: neo4j:5-community
    container_name: neo4j_benchmark
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/neo4jpass123
      - NEO4J_dbms_memory_heap_max__size=1G
      - NEO4J_dbms_memory_pagecache_size=512m
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
    volumes:
      - neo4j_data:/data
volumes:
  neo4j_data:
